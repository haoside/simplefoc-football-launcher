<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="40" y="50" fill="#e2e8f0" font-size="28" font-family="Arial">ESP32-S3 Host PCB Floorplan</text>
  <rect x="40" y="90" width="180" height="120" rx="12" fill="#1d4ed8"/>
  <text x="70" y="150" fill="#fff" font-size="22">24V IN</text>
  <text x="60" y="180" fill="#bfdbfe" font-size="16">Fuse / TVS / Filter</text>
  <rect x="260" y="90" width="180" height="120" rx="12" fill="#2563eb"/>
  <text x="300" y="150" fill="#fff" font-size="22">DCDC</text>
  <text x="280" y="180" fill="#bfdbfe" font-size="16">24V -> 5V / 3V3</text>
  <rect x="500" y="80" width="260" height="160" rx="14" fill="#059669"/>
  <text x="555" y="145" fill="#fff" font-size="26">ESP32-S3</text>
  <text x="560" y="175" fill="#d1fae5" font-size="16">Host Controller</text>
  <rect x="820" y="90" width="180" height="120" rx="12" fill="#7c3aed"/>
