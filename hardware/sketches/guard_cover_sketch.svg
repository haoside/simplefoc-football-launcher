<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950">
  <defs>
    <style>
      .title{font:700 32px Arial;fill:#0f172a}
      .sub{font:600 20px Arial;fill:#334155}
      .label{font:600 17px Arial;fill:#1e293b}
      .small{font:500 14px Arial;fill:#475569}
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}
      .guard{fill:#eef2ff;stroke:#6366f1;stroke-width:3;stroke-dasharray:10 8}
      .frame{fill:#e2e8f0;stroke:#475569;stroke-width:3}
      .wheel{fill:#cbd5e1;stroke:#334155;stroke-width:4}
      .ball{fill:#fde68a;stroke:#d97706;stroke-width:4}
      .cut{fill:#ffffff;stroke:#dc2626;stroke-width:3}
      .line{stroke:#334155;stroke-width:3;fill:none}
      .dim{stroke:#0f766e;stroke-width:2.5;fill:none;marker-start:url(#arr);marker-end:url(#arr)}
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M5,0 L10,5 L5,10 L0,5 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect width="1500" height="950" fill="#ffffff"/>
  <text x="40" y="52" class="title">防护罩单独草图（单球三轮足球发射器）</text>
  <text x="40" y="84" class="sub">P0：覆盖三轮前/上/侧方，保留出球窗口、检修开口、急停避让位</text>

  <rect x="40" y="120" width="700" height="760" rx="16" class="panel"/>
  <text x="60" y="155" class="sub">正视图</text>

  <circle cx="390" cy="340" r="108" class="ball"/>
  <circle cx="390" cy="215" r="74" class="wheel"/>
  <circle cx="282" cy="402" r="74" class="wheel"/>
  <circle cx="498" cy="402" r="74" class="wheel"/>

  <path d="M190 170 L590 170 L655 250 L640 575 L560 640 L220 640 L145 565 L130 255 Z" class="guard"/>
  <text x="520" y="665" class="small">PC防护罩包络</text>

  <rect x="585" y="305" width="72" height="95" rx="10" class="cut"/>
  <text x="545" y="290" class="small">出球窗口</text>

  <rect x="150" y="470" width="70" height="105" rx="10" class="cut"/>
  <text x="76" y="610" class="small">检修开口</text>

  <path d="M90 700 L680 700" class="dim"/>
  <text x="300" y="730" class="label">防护罩宽 550~700mm</text>
  <path d="M690 170 L690 640" class="dim"/>
  <text x="706" y="418" class="label">防护罩高 500~650mm</text>

  <text x="70" y="790" class="small">覆盖策略：</text>
  <text x="70" y="820" class="small">1. 上方防止手误触轮组</text>
  <text x="70" y="848" class="small">2. 前方仅保留最小出球窗口</text>
  <text x="70" y="876" class="small">3. 侧方保留单侧检修开口</text>

  <rect x="780" y="120" width="680" height="360" rx="16" class="panel"/>
  <text x="800" y="155" class="sub">侧视图</text>

  <path d="M980 410 L1320 410 L1375 452 L930 452 Z" class="frame"/>
  <circle cx="1180" cy="320" r="92" class="ball"/>
  <circle cx="1078" cy="318" r="62" class="wheel"/>
  <path d="M1085 165 L1260 165 L1320 235 L1020 235 Z" class="guard"/>
  <rect x="1275" y="286" width="75" height="72" rx="10" class="cut"/>
  <text x="1262" y="270" class="small">前向出球窗口</text>

  <path d="M935 540 L1360 540" class="dim"/>
  <text x="1080" y="570" class="label">防护罩深 250~400mm</text>

  <rect x="780" y="520" width="680" height="360" rx="16" class="panel"/>
  <text x="800" y="555" class="sub">安装与安全说明</text>

  <path d="M900 650 L1160 650 L1200 700 L860 700 Z" class="frame"/>
  <path d="M900 650 L870 600 M1160 650 L1190 600" class="line"/>
  <text x="930" y="740" class="label">罩体支架与主框架连接</text>

  <rect x="1240" y="620" width="110" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="1268" y="660" class="label">急停避让</text>

  <text x="820" y="790" class="small">材料：6~8mm PC 板，优先透明、抗冲击，不建议P0主防护用亚克力。</text>
  <text x="820" y="820" class="small">固定：可拆螺钉 + 金属支架，便于轮面更换与检修。</text>
  <text x="820" y="850" class="small">原则：防护罩不能遮挡急停，不能阻碍手动上球。</text>
</svg>
