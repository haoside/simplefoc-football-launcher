<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 28px 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill:#1f2937; }
      .subtitle { font: 500 14px 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill:#6b7280; }
      .label { font: 600 16px 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill:#374151; }
      .small { font: 500 13px 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
      .tiny { font: 500 12px 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill:#6b7280; }
      .tube { fill:#ffd6e3; stroke:#c2416c; stroke-width:2.2; }
      .tube-light { fill:#ffe6ee; stroke:#c2416c; stroke-width:1.8; }
      .motor { fill:#dbeafe; stroke:#2563eb; stroke-width:2; }
      .ball { fill:rgba(255,255,255,0.65); stroke:#9ca3af; stroke-width:1.8; }
      .patch { fill:#fcd34d; stroke:#d97706; stroke-width:1.2; }
      .mount { fill:#f9a8d4; stroke:#be185d; stroke-width:1.6; }
      .shield { fill:#ffffff; stroke:#059669; stroke-width:1.5; }
      .rib { fill:#fecdd3; stroke:#be185d; stroke-width:1.2; }
      .axis { stroke:#94a3b8; stroke-width:1.3; stroke-dasharray:8 6; }
      .dim { stroke:#111827; stroke-width:1.2; marker-start:url(#arrow); marker-end:url(#arrow); }
      .guide { stroke:#9ca3af; stroke-width:1; stroke-dasharray:4 4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="#fffafc"/>
  <text x="48" y="54" class="title">OUTRUNNER LAUNCH TUBE v1.1 — 三视图 / 结构说明</text>
  <text x="48" y="82" class="subtitle">6354 外转子 · inner_d = 232 保持 · 压紧量 2–3mm 可调 · 三电机同平面 / 120° 对称</text>

  <!-- Front view -->
  <text x="110" y="130" class="label">正视图</text>
  <g transform="translate(300,360)">
    <line x1="-210" y1="0" x2="210" y2="0" class="axis"/>
    <line x1="0" y1="-210" x2="0" y2="210" class="axis"/>
    <circle cx="0" cy="0" r="121" class="tube"/>
    <circle cx="0" cy="0" r="116" fill="#fffafc" stroke="#c2416c" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="110" class="ball"/>

    <!-- windows -->
    <g transform="rotate(-90)">
      <rect x="-35" y="108" width="70" height="60" rx="10" class="tube-light"/>
      <rect x="-40" y="104" width="80" height="68" rx="8" fill="none" class="guide"/>
    </g>
    <g transform="rotate(30)">
      <rect x="-35" y="108" width="70" height="60" rx="10" class="tube-light"/>
      <rect x="-40" y="104" width="80" height="68" rx="8" fill="none" class="guide"/>
    </g>
    <g transform="rotate(150)">
      <rect x="-35" y="108" width="70" height="60" rx="10" class="tube-light"/>
      <rect x="-40" y="104" width="80" height="68" rx="8" fill="none" class="guide"/>
    </g>

    <!-- motors -->
    <g transform="translate(0,144)">
      <circle cx="0" cy="0" r="31.5" class="motor"/>
      <rect x="-22" y="-6" width="44" height="12" class="patch" rx="4"/>
    </g>
    <g transform="translate(124.7,-72)">
      <circle cx="0" cy="0" r="31.5" class="motor"/>
      <rect x="-22" y="-6" width="44" height="12" class="patch" rx="4" transform="rotate(120)"/>
    </g>
    <g transform="translate(-124.7,-72)">
      <circle cx="0" cy="0" r="31.5" class="motor"/>
      <rect x="-22" y="-6" width="44" height="12" class="patch" rx="4" transform="rotate(60)"/>
    </g>

    <!-- shield tabs -->
    <g transform="rotate(-90)">
      <rect x="-56" y="129" width="12" height="10" class="shield"/>
      <rect x="44" y="129" width="12" height="10" class="shield"/>
      <rect x="-56" y="157" width="12" height="10" class="shield"/>
      <rect x="44" y="157" width="12" height="10" class="shield"/>
    </g>
    <g transform="rotate(30)">
      <rect x="-56" y="129" width="12" height="10" class="shield"/>
      <rect x="44" y="129" width="12" height="10" class="shield"/>
      <rect x="-56" y="157" width="12" height="10" class="shield"/>
      <rect x="44" y="157" width="12" height="10" class="shield"/>
    </g>
    <g transform="rotate(150)">
      <rect x="-56" y="129" width="12" height="10" class="shield"/>
      <rect x="44" y="129" width="12" height="10" class="shield"/>
      <rect x="-56" y="157" width="12" height="10" class="shield"/>
      <rect x="44" y="157" width="12" height="10" class="shield"/>
    </g>

    <text x="-92" y="-150" class="small">三工位 120° 对称</text>
    <line x1="-74" y1="-140" x2="-116" y2="-94" class="guide"/>
    <text x="42" y="188" class="small">6354 外转子包络</text>
    <line x1="42" y1="180" x2="12" y2="152" class="guide"/>
  </g>

  <!-- Side view -->
  <text x="550" y="130" class="label">侧视图</text>
  <g transform="translate(730,370)">
    <line x1="-250" y1="0" x2="250" y2="0" class="axis"/>
    <line x1="0" y1="-180" x2="0" y2="180" class="axis"/>

    <!-- tube body -->
    <rect x="-130" y="-121" width="260" height="242" rx="18" class="tube"/>
    <rect x="-130" y="-116" width="260" height="232" rx="14" fill="#fffafc" stroke="#c2416c" stroke-width="1.5"/>
    <polygon points="-165,-138 -130,-121 -130,121 -165,138" class="tube-light"/>
    <polygon points="165,-138 130,-121 130,121 165,138" class="tube-light"/>

    <!-- one visible window and ribs -->
    <rect x="-35" y="-31.5" width="70" height="63" rx="10" class="tube-light"/>
    <rect x="-51" y="-47.5" width="102" height="16" rx="4" class="rib"/>
    <rect x="-51" y="31.5" width="102" height="16" rx="4" class="rib"/>
    <rect x="-51" y="-53" width="16" height="106" rx="4" class="rib"/>
    <rect x="35" y="-53" width="16" height="106" rx="4" class="rib"/>
    <rect x="-43" y="-63" width="86" height="12" rx="4" class="rib"/>
    <rect x="-43" y="51" width="86" height="12" rx="4" class="rib"/>

    <!-- motor and mount -->
    <rect x="-27" y="-31.5" width="54" height="63" rx="12" class="motor"/>
    <rect x="-62" y="-47.5" width="8" height="95" rx="3" class="mount"/>
    <rect x="54" y="-47.5" width="8" height="95" rx="3" class="mount"/>
    <rect x="-62" y="48" width="124" height="14" rx="4" class="mount"/>
    <rect x="-74" y="-28" width="10" height="56" rx="3" class="mount"/>
    <rect x="64" y="-28" width="10" height="56" rx="3" class="mount"/>

    <!-- adjust slots -->
    <rect x="-72" y="-18" width="6" height="36" rx="3" fill="#fff" stroke="#be185d" stroke-width="1.2"/>
    <rect x="66" y="-18" width="6" height="36" rx="3" fill="#fff" stroke="#be185d" stroke-width="1.2"/>

    <!-- shield tabs -->
    <rect x="-60" y="-84" width="14" height="10" class="shield"/>
    <rect x="46" y="-84" width="14" height="10" class="shield"/>
    <rect x="-60" y="74" width="14" height="10" class="shield"/>
    <rect x="46" y="74" width="14" height="10" class="shield"/>

    <line x1="-20" y1="0" x2="20" y2="0" class="dim"/>
    <text x="-18" y="-10" class="small">2–3mm 压紧量</text>

    <line x1="-130" y1="160" x2="130" y2="160" class="dim"/>
    <text x="-28" y="153" class="small">tube_len 260</text>
    <line x1="-155" y1="-121" x2="-155" y2="121" class="dim"/>
    <text x="-218" y="6" class="small">inner_d 232</text>

    <text x="104" y="-104" class="small">透明防护罩安装耳</text>
    <line x1="120" y1="-96" x2="56" y2="-79" class="guide"/>
    <text x="104" y="100" class="small">近固定端短行程调节槽</text>
    <line x1="120" y1="92" x2="70" y2="18" class="guide"/>
  </g>

  <!-- Top view -->
  <text x="1030" y="130" class="label">俯视图</text>
  <g transform="translate(1110,370)">
    <line x1="-220" y1="0" x2="220" y2="0" class="axis"/>
    <line x1="0" y1="-160" x2="0" y2="160" class="axis"/>

    <rect x="-130" y="-121" width="260" height="242" rx="18" class="tube"/>
    <rect x="-130" y="-116" width="260" height="232" rx="14" fill="#fffafc" stroke="#c2416c" stroke-width="1.5"/>
    <polygon points="-165,-138 -130,-121 -130,121 -165,138" class="tube-light"/>
    <polygon points="165,-138 130,-121 130,121 165,138" class="tube-light"/>

    <rect x="-31.5" y="-27" width="63" height="54" rx="10" class="motor"/>
    <rect x="-47.5" y="-43" width="95" height="8" rx="3" class="mount"/>
    <rect x="-47.5" y="35" width="95" height="8" rx="3" class="mount"/>
    <rect x="48" y="-62" width="14" height="124" rx="4" class="mount"/>

    <rect x="-84" y="-60" width="10" height="14" class="shield"/>
    <rect x="-84" y="46" width="10" height="14" class="shield"/>
    <rect x="74" y="-60" width="10" height="14" class="shield"/>
    <rect x="74" y="46" width="10" height="14" class="shield"/>

    <text x="90" y="-96" class="small">端面固定板</text>
    <line x1="100" y1="-88" x2="56" y2="-40" class="guide"/>
    <text x="92" y="104" class="small">孔位参数化 / 槽孔保留修正余量</text>
    <line x1="90" y1="96" x2="58" y2="0" class="guide"/>
  </g>

  <!-- Notes -->
  <g transform="translate(70,700)">
    <text x="0" y="0" class="label">结构说明</text>
    <text x="0" y="34" class="small">1. 电机规格从 6374 切到 6354，默认 motor_d=63 / motor_len=54，端面孔位继续参数化。</text>
    <text x="0" y="64" class="small">2. inner_d=232 暂保留，压紧量控制在 2–3mm，可做小范围装配校准，不扩成大滑台。</text>
    <text x="0" y="94" class="small">3. 三侧窗口显式圆角，并增加内侧 relief，降低应力集中与刮球风险。</text>
    <text x="0" y="124" class="small">4. 每个窗口补 4 点透明防护罩安装位，后续可挂 PC 罩或局部护板。</text>
    <text x="0" y="154" class="small">5. 加强肋保持三工位对称，优先保证开窗后的边界刚度和载荷路径连续性。</text>

    <text x="0" y="214" class="label">待实测参数</text>
    <text x="0" y="248" class="small">• 6354 外壳实测直径 / 长度   • 端面孔距 / 螺纹规格 / 中心凸台</text>
    <text x="0" y="278" class="small">• 包胶厚度与包胶后总外径     • 动平衡要求与允许转速</text>
    <text x="0" y="308" class="small">• 透明罩厚度 / 螺钉头空间      • 散热气流路径与装配工具空间</text>

    <text x="700" y="0" class="label">冻结约束复核</text>
    <text x="700" y="34" class="small">✓ 三电机中心线同平面</text>
    <text x="700" y="64" class="small">✓ 三工位 120° / 等边三角形关系</text>
    <text x="700" y="94" class="small">✓ 外转子直接接触球，不加独立摩擦轮</text>
    <text x="700" y="124" class="small">✓ 底面固定逻辑 / 端面固定优先</text>
    <text x="700" y="154" class="small">✕ 不回退到星型/Y 型、三轴平行、顶面主安装</text>
  </g>
</svg>
