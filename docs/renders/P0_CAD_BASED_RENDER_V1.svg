<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#e2e8f0"/></linearGradient>
    <linearGradient id="al" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e5e7eb"/><stop offset="0.5" stop-color="#94a3b8"/><stop offset="1" stop-color="#334155"/></linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#334155"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <linearGradient id="pc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#bae6fd" stop-opacity="0.46"/><stop offset="1" stop-color="#0284c7" stop-opacity="0.16"/></linearGradient>
    <radialGradient id="ball" cx="35%" cy="28%" r="70%"><stop offset="0" stop-color="#fff"/><stop offset="0.68" stop-color="#e5e7eb"/><stop offset="1" stop-color="#94a3b8"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.22"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
    <style>
      .label{font-family:Inter,Arial,sans-serif;font-size:22px;fill:#0f172a}.small{font-family:Inter,Arial,sans-serif;font-size:17px;fill:#475569}.tiny{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#64748b}.dim{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1800" height="1100" fill="url(#bg)"/>
  <text x="70" y="74" class="label" font-size="38" font-weight="800">CAD-based P0 render · single-ball 3-BLDC football launcher</text>
  <text x="70" y="112" class="small">Based on existing OpenSCAD dimensions: short guide tube, motor mount plates, guard bracket, e-stop panel, battery clamp</text>

  <!-- floor -->
  <ellipse cx="900" cy="920" rx="660" ry="92" fill="#94a3b8" opacity="0.18"/>

  <!-- mobile base 1000x800 -->
  <g filter="url(#shadow)">
    <polygon points="370,760 1170,690 1430,825 630,930" fill="#1f2937"/>
    <polygon points="370,760 630,930 630,970 370,805" fill="#0f172a"/>
    <polygon points="630,930 1430,825 1430,865 630,970" fill="#020617"/>
    <polygon points="500,730 1110,675 1305,780 690,855" fill="#64748b"/>
    <text x="760" y="825" class="small" fill="#e5e7eb">mobile chassis envelope 1000 × 800mm</text>
  </g>

  <!-- chassis wheels -->
  <g filter="url(#shadow)">
    <g><ellipse cx="520" cy="930" rx="92" ry="48" fill="#020617"/><ellipse cx="520" cy="916" rx="62" ry="32" fill="#334155"/><text x="420" y="1004" class="tiny">rear 10–12" pneumatic</text></g>
    <g><ellipse cx="1260" cy="835" rx="92" ry="48" fill="#020617"/><ellipse cx="1260" cy="821" rx="62" ry="32" fill="#334155"/></g>
    <g><ellipse cx="720" cy="930" rx="52" ry="27" fill="#020617"/><ellipse cx="720" cy="922" rx="32" ry="17" fill="#475569"/><text x="680" y="1000" class="tiny">front 8" caster</text></g>
    <g><ellipse cx="1390" cy="820" rx="52" ry="27" fill="#020617"/><ellipse cx="1390" cy="812" rx="32" ry="17" fill="#475569"/></g>
  </g>

  <!-- battery clamp and battery bay based on scad -->
  <g filter="url(#shadow)">
    <polygon points="650,800 940,770 1045,825 750,858" fill="#111827"/>
    <polygon points="750,858 1045,825 1045,875 750,910" fill="#1e293b"/>
    <polygon points="650,800 750,858 750,910 650,850" fill="#020617"/>
    <rect x="755" y="810" width="250" height="30" rx="7" fill="url(#al)" transform="rotate(-6 880 825)"/>
    <text x="720" y="790" class="tiny">battery clamp 260×35×4mm</text>
  </g>

  <!-- vertical frame -->
  <g filter="url(#shadow)">
    <line x1="660" y1="760" x2="660" y2="415" stroke="#334155" stroke-width="28" stroke-linecap="round"/>
    <line x1="1160" y1="700" x2="1120" y2="405" stroke="#334155" stroke-width="28" stroke-linecap="round"/>
    <line x1="660" y1="415" x2="1120" y2="405" stroke="#334155" stroke-width="24" stroke-linecap="round"/>
    <line x1="700" y1="720" x2="1020" y2="450" stroke="#475569" stroke-width="18" stroke-linecap="round"/>
    <line x1="1070" y1="690" x2="790" y2="450" stroke="#475569" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- short guide tube from SCAD: length 200, inner 232, outer 240, flange 270, flare 255 -->
  <g filter="url(#shadow)" transform="translate(0 0)">
    <ellipse cx="620" cy="500" rx="142" ry="92" fill="#cbd5e1" stroke="#64748b" stroke-width="5"/>
    <ellipse cx="620" cy="500" rx="122" ry="76" fill="#f8fafc" stroke="#94a3b8" stroke-width="4"/>
    <path d="M620 424 L815 385 Q870 420 870 500 Q870 580 815 615 L620 576 Q690 548 690 500 Q690 452 620 424 Z" fill="#e2e8f0" stroke="#64748b" stroke-width="4"/>
    <path d="M628 448 L805 415 Q835 448 835 500 Q835 552 805 585 L628 552 Q675 532 675 500 Q675 468 628 448 Z" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <g fill="#334155">
      <circle cx="620" cy="365" r="6"/><circle cx="740" cy="430" r="6"/><circle cx="740" cy="570" r="6"/><circle cx="620" cy="635" r="6"/><circle cx="500" cy="570" r="6"/><circle cx="500" cy="430" r="6"/>
    </g>
    <text x="435" y="340" class="small">short guide tube SCAD</text>
    <text x="410" y="365" class="tiny">L=200mm · ID=232mm · flange Ø270mm</text>
  </g>

  <!-- ball inside launcher -->
  <g filter="url(#shadow)">
    <circle cx="910" cy="500" r="96" fill="url(#ball)" stroke="#111827" stroke-width="3"/>
    <path d="M862 435 L915 420 L962 455 L946 522 L884 528 L848 484 Z" fill="none" stroke="#111827" stroke-width="7" opacity="0.75"/>
    <path d="M915 420 L910 500 M962 455 L910 500 M946 522 L910 500 M884 528 L910 500 M848 484 L910 500" stroke="#111827" stroke-width="4" opacity="0.55"/>
    <text x="850" y="625" class="tiny">size-5 football Ø220mm</text>
  </g>

  <!-- motor mount plates 180x140x8 and wheels -->
  <g filter="url(#shadow)">
    <!-- top plate/wheel -->
    <g transform="translate(910 290)">
      <rect x="-90" y="-70" width="180" height="140" rx="10" fill="url(#al)" stroke="#334155" stroke-width="4"/>
      <rect x="-60" y="-10" width="120" height="20" rx="10" fill="#475569" opacity="0.65"/>
      <circle cx="0" cy="0" r="12" fill="#0f172a"/><g fill="#0f172a"><circle cx="-35" cy="-35" r="5"/><circle cx="35" cy="-35" r="5"/><circle cx="-35" cy="35" r="5"/><circle cx="35" cy="35" r="5"/></g>
      <ellipse cx="0" cy="122" rx="120" ry="45" fill="#020617"/><ellipse cx="0" cy="122" rx="80" ry="26" fill="#334155"/>
      <text x="-95" y="-92" class="tiny">motor plate 180×140×8mm</text>
    </g>
    <!-- right -->
    <g transform="translate(1118 595) rotate(118)">
      <rect x="-90" y="-70" width="180" height="140" rx="10" fill="url(#al)" stroke="#334155" stroke-width="4"/>
      <rect x="-60" y="-10" width="120" height="20" rx="10" fill="#475569" opacity="0.65"/>
      <circle cx="0" cy="0" r="12" fill="#0f172a"/><g fill="#0f172a"><circle cx="-35" cy="-35" r="5"/><circle cx="35" cy="-35" r="5"/><circle cx="-35" cy="35" r="5"/><circle cx="35" cy="35" r="5"/></g>
      <ellipse cx="0" cy="122" rx="120" ry="45" fill="#020617"/><ellipse cx="0" cy="122" rx="80" ry="26" fill="#334155"/>
    </g>
    <!-- left -->
    <g transform="translate(702 595) rotate(-118)">
      <rect x="-90" y="-70" width="180" height="140" rx="10" fill="url(#al)" stroke="#334155" stroke-width="4"/>
      <rect x="-60" y="-10" width="120" height="20" rx="10" fill="#475569" opacity="0.65"/>
      <circle cx="0" cy="0" r="12" fill="#0f172a"/><g fill="#0f172a"><circle cx="-35" cy="-35" r="5"/><circle cx="35" cy="-35" r="5"/><circle cx="-35" cy="35" r="5"/><circle cx="35" cy="35" r="5"/></g>
      <ellipse cx="0" cy="122" rx="120" ry="45" fill="#020617"/><ellipse cx="0" cy="122" rx="80" ry="26" fill="#334155"/>
    </g>
  </g>

  <!-- PC cover, bracket based on guard 220x40 -->
  <g>
    <path d="M540,330 C700,210 1050,185 1260,330 C1360,485 1280,700 1060,760 C820,800 560,720 495,570 C455,475 465,395 540,330 Z" fill="url(#pc)" stroke="#0284c7" stroke-width="5" opacity="0.75"/>
    <rect x="1180" y="488" width="220" height="40" rx="6" fill="url(#al)" stroke="#334155" transform="rotate(8 1290 508)"/>
    <g fill="#334155"><circle cx="1220" cy="504" r="5"/><circle cx="1270" cy="511" r="5"/><circle cx="1320" cy="518" r="5"/><circle cx="1370" cy="525" r="5"/></g>
    <text x="1220" y="460" class="tiny">guard bracket 220×40×4mm</text>
  </g>

  <!-- estop panel from SCAD 100x80x3 -->
  <g filter="url(#shadow)">
    <polygon points="1250,665 1360,650 1405,690 1295,710" fill="#cbd5e1" stroke="#334155" stroke-width="3"/>
    <circle cx="1330" cy="680" r="28" fill="#dc2626" stroke="#7f1d1d" stroke-width="7"/>
    <text x="1265" y="742" class="tiny">e-stop panel 100×80×3mm</text>
  </g>

  <!-- dimensions/callouts -->
  <g>
    <line x1="520" y1="210" x2="760" y2="210" class="dim"/><text x="535" y="198" class="tiny">short guide tube length 200mm</text>
    <line x1="910" y1="170" x2="910" y2="260" class="dim"/><text x="930" y="210" class="tiny">wheel1 @ 12:00</text>
    <line x1="1118" y1="595" x2="1320" y2="610" class="dim"/><text x="1330" y="618" class="tiny">wheel2 @ 4:00</text>
    <line x1="702" y1="595" x2="500" y2="635" class="dim"/><text x="285" y="646" class="tiny">wheel3 @ 8:00</text>
    <line x1="630" y1="970" x2="1430" y2="865" class="dim"/><text x="910" y="1015" class="tiny">base target 1000×800mm</text>
  </g>

  <!-- notes -->
  <g>
    <rect x="60" y="900" width="470" height="130" rx="18" fill="#ffffff" opacity="0.9" stroke="#cbd5e1"/>
    <text x="86" y="936" class="label" font-size="24" font-weight="800">Closer-to-build notes</text>
    <text x="86" y="968" class="small">• Short guide tube follows SCAD: ID 232mm, flange Ø270mm</text>
    <text x="86" y="996" class="small">• Motor plates follow SCAD: 180×140×8mm</text>
    <text x="86" y="1024" class="small">• No hopper / no feed tube / no gate</text>
  </g>
</svg>
