; PlatformIO build configuration for SimpleFOC Football Launcher — Host (ESP32-S3)
; Build:  pio run -e host
;
; Note: framework = espidf is the production target. Arduino is used here for
;       compilation verification in CI/sandbox where ESP-IDF venv setup fails.
;       Switch to framework = espidf for real hardware bring-up.

[platformio]
src_dir = .

[env:host]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Source files — pick application code, HAL implementation, and shared protocol
; Default: stub HAL (compiles without hardware / with Arduino framework).
; For real ESP-IDF hardware: switch host_hal_stub.cpp to espidf/host_hal_espidf_real.cpp
; and change framework to espidf.
build_src_filter =
    +<src/*.cpp>
    +<src/hal/host_hal_stub.cpp>
    -<src/hal/espidf/*>
    +<common/protocol_codec.cpp>

; Include paths
build_flags =
    -I include
    -I src/hal
    -I common

monitor_speed = 115200
