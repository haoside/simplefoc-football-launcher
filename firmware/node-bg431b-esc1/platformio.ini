; PlatformIO build configuration for SimpleFOC Football Launcher — Motor Node (B-G431B-ESC1)
; Build:  pio run -e node

[platformio]
src_dir = .

[env:node]
platform = ststm32
board = disco_b_g431b_esc1
framework = stm32cube

; Source files — pick application code, HAL stubs, and shared protocol
build_src_filter =
    +<src/*.cpp>
    +<hal/*.cpp>
    +<common/protocol_codec.cpp>

; Include paths
build_flags =
    -I include
    -I hal
    -I config
    -I common

monitor_speed = 115200
